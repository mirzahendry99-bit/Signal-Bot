name: Signal Bot Lite v1.4

on:
  schedule:
    - cron: "0 * * * *"    # setiap jam — full scan
    - cron: "30 * * * *"   # setiap 30 menit — monitor open trades
  workflow_dispatch:
    inputs:
      reason:
        description: "Alasan manual run (opsional)"
        required: false
        default: "manual trigger"
      scan_mode:
        description: "Scan mode: full (default) atau monitor"
        required: false
        default: "full"

concurrency:
  group: signal-bot-lite
  cancel-in-progress: true

jobs:
  run-bot:
    name: Run Signal Bot Lite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:              ${{ secrets.CHAT_ID }}
          GATE_API_KEY:         ${{ secrets.GATE_API_KEY }}
          GATE_SECRET_KEY:      ${{ secrets.GATE_SECRET_KEY }}
          INITIAL_EQUITY_USDT:  ${{ secrets.INITIAL_EQUITY_USDT }}
          SCAN_MODE:            ${{ github.event.inputs.scan_mode || 'full' }}
        run: |
          for i in 1 2 3; do
            python bot_lite_v1_4.py && break
            echo "Attempt $i failed, retrying..."
            sleep 10
          done

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:        ${{ secrets.CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
          -d chat_id="${CHAT_ID}" \
          -d text="⚠️ GitHub Actions GAGAL — bot tidak jalan!"

      - name: Upload signals.jsonl
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signals-jsonl-${{ github.run_number }}
          path: signals.jsonl
          if-no-files-found: ignore
          retention-days: 7
