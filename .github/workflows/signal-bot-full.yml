name: Signal Bot — Full Scan

on:
  schedule:
    # Setiap 2 jam (sinkron dengan "Scan berikutnya dalam 2 jam" di bot)
    - cron: '0 */2 * * *'
  workflow_dispatch:   # trigger manual dari GitHub Actions UI

jobs:
  full-scan:
    name: Run INTRADAY + SWING scan
    runs-on: ubuntu-latest
    # [v9.2.5] Dinaikkan 15 → 20 menit sebagai buffer.
    # v9.2+ menambahkan wick scan (1m candles per open trade) di evaluate_open_trades
    # sehingga runtime aktual naik ~1-2 menit dari sebelumnya.
    timeout-minutes: 20

    env:
      GATE_API_KEY:       ${{ secrets.GATE_API_KEY }}
      GATE_SECRET_KEY:    ${{ secrets.GATE_SECRET_KEY }}
      SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
      TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
      CHAT_ID:            ${{ secrets.CHAT_ID }}
      INITIAL_EQUITY_USDT: ${{ secrets.INITIAL_EQUITY_USDT }}
      SCAN_MODE:          full

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # [v9.1] Unit test wajib dijalankan sebelum bot — cegah deploy kode broken
      - name: Run unit tests
        run: python bot.py --test

      - name: Run full scan
        run: python bot.py
