name: Signal Bot Lite v1.4 — 24h Scan

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    name: Run Signal Bot Lite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install supabase gate-api numpy

      - name: Run bot
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:             ${{ secrets.CHAT_ID }}
          GATE_API_KEY:        ${{ secrets.GATE_API_KEY }}
          GATE_SECRET_KEY:     ${{ secrets.GATE_SECRET_KEY }}
          INITIAL_EQUITY_USDT: ${{ secrets.INITIAL_EQUITY_USDT }}
        run: |
          python bot_lite_v1_4.py
