name: Signal Bot Lite v1.4.1

on:
  schedule:
    - cron: "0 * * * *"    # setiap jam — full scan
    - cron: "30 * * * *"   # setiap 30 menit — monitor open trades
  workflow_dispatch:
    inputs:
      reason:
        description: "Alasan manual run (opsional)"
        required: false
        default: "manual trigger"
      scan_mode:
        description: "Scan mode: full (default) atau monitor"
        required: false
        default: "full"
      sell_enabled:
        description: "Aktifkan SELL signals? (true/false)"
        required: false
        default: "false"

concurrency:
  group: signal-bot-lite
  cancel-in-progress: true

jobs:
  run-bot:
    name: Run Signal Bot Lite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        # [FIX HIGH-4] Jalankan unit tests sebelum bot — gagal jika ada test yang pecah.
        # Bot tidak akan jalan jika kalkulasi SL/TP/score ada regresi.
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:             ${{ secrets.CHAT_ID }}
          GATE_API_KEY:        ${{ secrets.GATE_API_KEY }}
          GATE_SECRET_KEY:     ${{ secrets.GATE_SECRET_KEY }}
          INITIAL_EQUITY_USDT: ${{ secrets.INITIAL_EQUITY_USDT }}
        run: python bot_lite_v1_4_1.py --test

      - name: Run bot
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:              ${{ secrets.CHAT_ID }}
          GATE_API_KEY:         ${{ secrets.GATE_API_KEY }}
          GATE_SECRET_KEY:      ${{ secrets.GATE_SECRET_KEY }}
          INITIAL_EQUITY_USDT:  ${{ secrets.INITIAL_EQUITY_USDT }}
          SCAN_MODE:            ${{ github.event.inputs.scan_mode || 'full' }}
          # [FIX HIGH-3] SELL_ENABLED dari env var — bisa diubah tanpa edit kode.
          # Set SELL_ENABLED=true di GitHub vars (bukan secrets) untuk aktifkan.
          # Atau override via workflow_dispatch input di atas.
          SELL_ENABLED:         ${{ github.event.inputs.sell_enabled || vars.SELL_ENABLED || 'false' }}
        run: |
          for i in 1 2 3; do
            python bot_lite_v1_4_1.py && break
            echo "Attempt $i failed, retrying..."
            sleep 10
          done

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:        ${{ secrets.CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
          -d chat_id="${CHAT_ID}" \
          -d text="⚠️ GitHub Actions GAGAL — bot tidak jalan!"

      - name: Upload signals.jsonl
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signals-jsonl-${{ github.run_number }}
          path: signals.jsonl
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload halt_state.json
        # [FIX MED-1] Upload halt_state.json sebagai artifact untuk debugging
        # jika Supabase bot_config tidak terupdate dengan benar.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: halt-state-${{ github.run_number }}
          path: halt_state.json
          if-no-files-found: ignore
          retention-days: 3
