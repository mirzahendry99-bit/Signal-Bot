name: Signal Bot — Monitor

on:
  schedule:
    # Setiap 5 menit — near-realtime TP/SL lifecycle tracking
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    name: Run monitor mode
    runs-on: ubuntu-latest
    timeout-minutes: 4   # Monitor mode ringan — cukup 4 menit

    env:
      GATE_API_KEY:       ${{ secrets.GATE_API_KEY }}
      GATE_SECRET_KEY:    ${{ secrets.GATE_SECRET_KEY }}
      SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
      TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
      CHAT_ID:            ${{ secrets.CHAT_ID }}
      INITIAL_EQUITY_USDT: ${{ secrets.INITIAL_EQUITY_USDT }}
      SCAN_MODE:          monitor

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        run: python bot.py
