name: Signal Bot — Pump Scanner

on:
  schedule:
    # Setiap 30 menit — pump signal butuh respons lebih cepat dari full scan
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  pump-scan:
    name: Run pump scan
    runs-on: ubuntu-latest
    timeout-minutes: 6   # Pump scan lebih ringan dari full scan

    env:
      GATE_API_KEY:       ${{ secrets.GATE_API_KEY }}
      GATE_SECRET_KEY:    ${{ secrets.GATE_SECRET_KEY }}
      SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
      TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
      CHAT_ID:            ${{ secrets.CHAT_ID }}
      INITIAL_EQUITY_USDT: ${{ secrets.INITIAL_EQUITY_USDT }}
      SCAN_MODE:          pump

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pump scanner
        run: python bot.py
