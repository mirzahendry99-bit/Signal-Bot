name: Signal Bot — PUMP

on:
  schedule:
    # Setiap 15 menit — pump bisa selesai dalam hitungan menit
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  pump-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install gate-api pandas numpy supabase requests

      - name: Run PUMP scan
        env:
          GATE_API_KEY: ${{ secrets.GATE_API_KEY }}
          GATE_SECRET_KEY: ${{ secrets.GATE_SECRET_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SCAN_MODE: pump
        run: python bot.py
